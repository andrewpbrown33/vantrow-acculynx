name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  apps:
    name: Lint, typecheck, build apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from packageManager in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  spec:
    name: Lint Vantrow Connect spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npx -y @redocly/cli@latest lint docs/specs/vantrow-connect/openapi.yaml
