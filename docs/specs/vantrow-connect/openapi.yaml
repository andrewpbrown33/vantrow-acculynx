        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project
      description: >-
        Fetch a single project by id. Requires the `read:projects` scope.
        Returns 404 for ids that do not exist or belong to another tenant
        (existence is never disclosed across tenants).
      parameters:
        - name: id
          in: path
          required: true
          description: Project id (`proj_...`).
          schema:
            type: string
            pattern: '^proj_[0-9a-z]{8,32}$'
      responses:
        '200':
          description: The project.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
              example:
                data:
                  id: proj_01jm5y0c4t6hqe8v
                  tenant_id: ten_01jm5wq0f8kavr3x
                  name: Whitfield Residence - Roof Replacement
