components:
  securitySchemes:
    bearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: Vantrow Connect API key
      description: >-
        Per-tenant scoped API key issued by the producing platform, sent as
        `Authorization: Bearer vc_live_...` (or `vc_test_...` against sandbox
        data). See `auth.md` for scopes, issuance, and rotation.

  parameters:
    Limit:
      name: limit
      in: query
      required: false
      description: Page size. Default 25, maximum 100.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    Cursor:
      name: cursor
      in: query
      required: false
      description: >-
        Opaque cursor from a previous response's `meta.next_cursor`. Omit for
        the first page. Cursors expire after 24 hours; a 400
        `invalid_request` means restart from the first page.
      schema:
        type: string
    UpdatedSince:
      name: updated_since
      in: query
      required: false
      description: >-
        Only return records with `updated_at` strictly greater than this
        RFC 3339 timestamp. Intended for incremental sync and webhook
        reconciliation.
      schema:
        type: string
        format: date-time

  headers:
    X-RateLimit-Limit:
      description: Maximum requests allowed in the current window (per API key).
      schema:
        type: integer
    X-RateLimit-Remaining:
      description: Requests remaining in the current window.
      schema:
        type: integer
    X-RateLimit-Reset:
      description: Unix epoch seconds at which the current window resets.
      schema:
        type: integer
    Retry-After:
      description: Seconds to wait before retrying.
      schema:
        type: integer

  responses:
    BadRequest:
      description: Malformed or invalid request (bad parameter, expired cursor).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: invalid_request
              message: 'Invalid value for parameter "period": expected one of mtd, qtd, ytd, last_7d, last_30d, last_90d, custom.'
              request_id: req_9f2c1a7d0b4e
    Unauthorized:
      description: Missing, malformed, or revoked API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: unauthorized
              message: Invalid or revoked API key.
              request_id: req_2b8d4e6f1a3c
    Forbidden:
      description: Valid key, but the required scope is not granted.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: forbidden
              message: 'API key is missing required scope: read:projects.'
              request_id: req_7e5a3c9b2d1f
    NotFound:
      description: >-
        No such record for this tenant. Also returned for records belonging to
        other tenants (existence is never disclosed across tenants).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: not_found
              message: Project not found.
              request_id: req_4c6e8a0b3d5f
    RateLimited:
      description: Rate limit exceeded for this API key. Respect Retry-After.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: rate_limited
              message: Rate limit exceeded. Retry after 30 seconds.
              request_id: req_1a3c5e7f9b2d

  schemas:
    Money:
      type: object
      description: >-
        Monetary value. `amount` is in minor units of `currency` (e.g. cents
        for USD).
      additionalProperties: false
      required: [amount, currency]
      properties:
        amount:
          type: integer
          description: Amount in minor units. May be negative for credits.
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO 4217 alphabetic currency code, uppercase.

    Address:
      type: object
      description: Postal address.
      additionalProperties: false
      required: [line1, line2, city, region, postal_code, country]
      properties:
        line1:
          type: string
          minLength: 1
        line2:
          type: ['string', 'null']
        city:
          type: string
          minLength: 1
        region:
          type: string
          description: State / province / region code or name.
        postal_code:
          type: string
        country:
          type: string
          pattern: '^[A-Z]{2}$'
          description: ISO 3166-1 alpha-2 country code, uppercase.

    Extensions:
      type: object
      description: >-
        Namespaced vertical extensions (e.g. `"roofing.claim"`). Keys are
        dot-separated lowercase namespaces; values are objects defined by the
        owning vertical's extension docs. Core consumers MUST ignore unknown
        keys. Always present; empty object when there is nothing to add.
      propertyNames:
        pattern: '^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)+$'
      additionalProperties:
        type: object

    Tenant:
      type: object
      description: >-
        A contractor account on a Vantrow-subsidiary platform. Not returned by
        any v1 endpoint (the key itself is tenant-scoped); defined here as the
        anchor of the model and for a planned `GET /v1/tenant` in a later
        minor version.
      additionalProperties: false
      required: [id, tenant_id, name, vertical, timezone, currency, created_at, updated_at, extensions]
      properties:
        id:
          type: string
          pattern: '^ten_[0-9a-z]{8,32}$'
        tenant_id:
          type: string
          pattern: '^ten_[0-9a-z]{8,32}$'
          description: Equal to `id`; present for envelope uniformity.
        name:
          type: string
          minLength: 1
        vertical:
          type: string
          pattern: '^[a-z][a-z0-9_]*$'
          description: Vertical slug (e.g. `roofing`); the extension namespace root.
        timezone:
          type: string
          description: IANA timezone (e.g. `America/New_York`).
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        extensions:
          $ref: '#/components/schemas/Extensions'

    Contact:
      type: object
      description: A person or business the tenant works with.
      additionalProperties: false
      required: [id, tenant_id, first_name, last_name, company_name, email, phone, address, created_at, updated_at, extensions]
      properties:
        id:
          type: string
          pattern: '^ctc_[0-9a-z]{8,32}$'
        tenant_id:
          type: string
          pattern: '^ten_[0-9a-z]{8,32}$'
        first_name:
          type: string
          minLength: 1
        last_name:
          type: string
          minLength: 1
        company_name:
          type: ['string', 'null']
        email:
          type: ['string', 'null']
          format: email
        phone:
          type: ['string', 'null']
        address:
          anyOf:
            - $ref: '#/components/schemas/Address'
            - type: 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        extensions:
          $ref: '#/components/schemas/Extensions'

    Project:
      type: object
      description: >-
        A unit of work for a customer. Verticals map their primary work object
        onto this (roofing "job" -> project). `status` is the frozen core
        enum; `status_detail` carries the vertical's native stage verbatim.
      additionalProperties: false
      required: [id, tenant_id, name, status, status_detail, contact_id, address, contract_value, created_at, updated_at, extensions]
      properties:
        id:
          type: string
          pattern: '^proj_[0-9a-z]{8,32}$'
        tenant_id:
          type: string
          pattern: '^ten_[0-9a-z]{8,32}$'
        name:
          type: string
          minLength: 1
        status:
          type: string
          enum: [lead, quoted, approved, in_progress, completed, closed, canceled]
          description: Core lifecycle status; frozen within v1.
        status_detail:
          type: ['string', 'null']
          description: >-
            Vertical-native stage, free-form. Display verbatim; never branch
            on it.
        contact_id:
          type: ['string', 'null']
          pattern: '^ctc_[0-9a-z]{8,32}$'
        address:
          anyOf:
            - $ref: '#/components/schemas/Address'
            - type: 'null'
          description: Job-site address.
        contract_value:
          anyOf:
            - $ref: '#/components/schemas/Money'
            - type: 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        extensions:
          $ref: '#/components/schemas/Extensions'

    Invoice:
      type: object
      description: A bill issued by the tenant to a customer.
      additionalProperties: false
      required: [id, tenant_id, project_id, contact_id, number, status, total, amount_due, issued_at, due_at, paid_at, created_at, updated_at, extensions]
      properties:
        id:
          type: string
          pattern: '^inv_[0-9a-z]{8,32}$'
        tenant_id:
          type: string
          pattern: '^ten_[0-9a-z]{8,32}$'
        project_id:
          type: ['string', 'null']
          pattern: '^proj_[0-9a-z]{8,32}$'
        contact_id:
          type: ['string', 'null']
          pattern: '^ctc_[0-9a-z]{8,32}$'
        number:
          type: string
          minLength: 1
          description: Human-facing invoice number, unique per tenant.
        status:
          type: string
          enum: [draft, open, paid, void]
          description: >-
            Frozen within v1. Partial payment: `amount_due` < `total` while
            status stays `open`.
        total:
          $ref: '#/components/schemas/Money'
        amount_due:
          $ref: '#/components/schemas/Money'
          description: Remaining balance; 0 when paid.
        issued_at:
          type: ['string', 'null']
          format: date-time
        due_at:
          type: ['string', 'null']
          format: date-time
        paid_at:
          type: ['string', 'null']
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        extensions:
          $ref: '#/components/schemas/Extensions'

    Metric:
      type: object
      description: >-
        A named, pre-aggregated KPI computed by the platform for dashboard
        display.
      additionalProperties: false
      required: [id, tenant_id, key, label, unit, value, currency, period, created_at, updated_at, extensions]
      properties:
        id:
          type: string
          pattern: '^met_[0-9a-z]{8,32}$'
          description: Stable per tenant+key.
        tenant_id:
          type: string
          pattern: '^ten_[0-9a-z]{8,32}$'
        key:
          type: string
          pattern: '^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)*$'
          description: >-
            Stable machine key (e.g. `revenue_mtd`). Vertical metrics are
            namespaced (e.g. `roofing.claims_open`).
        label:
          type: string
          minLength: 1
        unit:
          type: string
          enum: [currency_minor, count, days, percent, ratio]
          description: '`currency_minor`: value is minor units of `currency`.'
        value:
          type: number
        currency:
          type: ['string', 'null']
          pattern: '^[A-Z]{3}$'
          description: Set when unit is `currency_minor`, null otherwise.
        period:
          anyOf:
            - type: object
              additionalProperties: false
              required: [from, to]
              properties:
                from:
                  type: string
                  format: date-time
                to:
                  type: string
                  format: date-time
            - type: 'null'
          description: >-
            Aggregation window; null for point-in-time snapshots (as-of
            `updated_at`).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          description: Last time the value was computed.
        extensions:
          $ref: '#/components/schemas/Extensions'

    PageMeta:
      type: object
      description: Pagination metadata for list responses.
      additionalProperties: false
      required: [limit, next_cursor]
      properties:
        limit:
          type: integer
          description: Page size that was applied.
        next_cursor:
          type: ['string', 'null']
          description: >-
            Opaque cursor for the next page; pass as `?cursor=`. Null when
            there are no further pages.

    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, version, time]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
          const: v1
          description: Major contract version served by this host.
        time:
          type: string
          format: date-time
          description: Server time (RFC 3339).

    Error:
      type: object
      description: Error detail carried by every non-2xx response.
      additionalProperties: false
      required: [code, message, request_id]
      properties:
        code:
          type: string
          enum: [invalid_request, unauthorized, forbidden, not_found, rate_limited, internal_error]
          description: Machine-readable error code; stable within v1.
        message:
          type: string
          description: Human-readable explanation. Not stable; do not parse.
        request_id:
          type: string
          description: >-
            Correlation id (`req_...`) to quote when reporting issues to the
            producing platform.

    ErrorResponse:
      type: object
      description: Standard error envelope.
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/Error'
