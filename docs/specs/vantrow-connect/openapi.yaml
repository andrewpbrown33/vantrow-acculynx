                      roofing.job:
                        material: asphalt_architectural
                        squares: 32.5
                        pitch: 8/12
                        stories: 2
                        tear_off: true
                  - id: proj_01jm5y1d7g3jrf9w
                    tenant_id: ten_01jm5wq0f8kavr3x
                    name: Bell Residence - Standing Seam Metal Re-roof
                    status: approved
                    status_detail: deposit_pending
