openapi: 3.1.0

info:
  title: Vantrow Connect API
  version: 0.1.0
  summary: Read-only integration contract between Vantrow-subsidiary platforms (producers) and Vantrow client dashboards (consumers).
  description: >-
    **Status: v0 DRAFT** — entity fields to be reconciled against
    `docs/research/acculynx/04-inferred-data-model.md` and
    `05-public-api-teardown.md` when those land (one revision pass expected).


    Vantrow Connect exposes a small vertical-agnostic core model (tenant,
    contact, project, invoice, metric) that every Vantrow-subsidiary platform
    maps its native domain into. Vertical-specific data rides in the
    namespaced `extensions` object on every entity (exemplar: `roofing.*`).
    v1 is **read-only for dashboards**: every operation is a GET.


    The JSON Schemas under `schemas/` are normative; the component schemas in
    this document mirror them. The JSON files under `fixtures/` are the golden
    payloads both implementations must validate against — the inline response
    examples in this document are copies of those fixtures.
  contact:
    name: Vantrow Platform Team
    email: platform@vantrow.example
  license:
    name: Proprietary (Vantrow internal)
    url: https://vantrow.example/legal/connect-license

servers:
  - url: https://api.example.com
    description: >-
      Placeholder host. The real API host is set post-branding (Gate 1 of the
      program plan); only the host changes — paths and payloads are stable.

security:
  - bearerApiKey: []

tags:
  - name: health
    description: Service liveness. Unauthenticated.
  - name: metrics
    description: Pre-aggregated KPIs for dashboard display.
  - name: projects
    description: Units of work (roofing vertical maps "job" onto project).
  - name: contacts
    description: People and businesses the tenant works with.
  - name: invoices
    description: Bills issued by the tenant.

paths:
  /v1/health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Service health
      description: >-
        Liveness probe. Unauthenticated and not tenant-scoped. Also useful for
        verifying connectivity before configuring credentials.
      security: []
      responses:
        '200':
          description: Service is reachable.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                version: v1
                time: '2026-07-15T12:00:00Z'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/metrics:
    get:
      operationId: listMetrics
      tags: [metrics]
      summary: List metrics
      description: >-
        Returns pre-aggregated KPIs computed by the platform. Dashboards
        display metric values; they never re-aggregate raw data in v1.
        Requires the `read:metrics` scope. Not paginated: the metric catalog
        per tenant is small and bounded.
      parameters:
        - name: keys
          in: query
          required: false
          description: >-
            Comma-separated metric keys to return (e.g.
            `keys=revenue_mtd,jobs_in_progress`). Omit for all metrics the
            tenant exposes. Unknown keys are ignored, not an error.
          schema:
            type: array
            items:
              type: string
              pattern: '^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)*$'
          style: form
          explode: false
        - name: period
          in: query
          required: false
          description: >-
            Named aggregation window. Defaults to each metric's natural window
            (e.g. `revenue_mtd` is inherently month-to-date). Use `custom`
            with `from`/`to` for an explicit range; metrics that cannot be
            recomputed for arbitrary windows are omitted from a `custom`
            response.
          schema:
            type: string
            enum: [mtd, qtd, ytd, last_7d, last_30d, last_90d, custom]
        - name: from
          in: query
          required: false
          description: Start of window (inclusive). Required when `period=custom`.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: End of window (exclusive). Required when `period=custom`.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Metrics for the authenticated tenant.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Metric'
              example:
                data:
                  - id: met_01jm6a0b2ce4qk7n
                    tenant_id: ten_01jm5wq0f8kavr3x
                    key: revenue_mtd
                    label: Revenue (month to date)
                    unit: currency_minor
                    value: 18425000
                    currency: USD
                    period:
                      from: '2026-07-01T00:00:00Z'
                      to: '2026-07-15T00:00:00Z'
                    created_at: '2026-05-01T00:00:00Z'
                    updated_at: '2026-07-15T09:30:00Z'
                    extensions: {}
                  - id: met_01jm6a1p9dw5rm3s
                    tenant_id: ten_01jm5wq0f8kavr3x
                    key: jobs_in_progress
                    label: Jobs in progress
                    unit: count
                    value: 14
                    currency: null
                    period: null
                    created_at: '2026-05-01T00:00:00Z'
                    updated_at: '2026-07-15T09:30:00Z'
                    extensions: {}
                  - id: met_01jm6a2t6fx8vn5j
                    tenant_id: ten_01jm5wq0f8kavr3x
                    key: avg_cycle_days
                    label: Average job cycle time (days)
                    unit: days
                    value: 41.3
                    currency: null
                    period:
                      from: '2026-04-16T00:00:00Z'
                      to: '2026-07-15T00:00:00Z'
                    created_at: '2026-05-01T00:00:00Z'
                    updated_at: '2026-07-15T09:30:00Z'
                    extensions: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects
      description: >-
        Cursor-paginated list of projects for the authenticated tenant, newest
        `updated_at` first. Requires the `read:projects` scope. Use
        `updated_since` for incremental sync and webhook reconciliation.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          required: false
          description: Filter by core status.
          schema:
            type: string
            enum: [lead, quoted, approved, in_progress, completed, closed, canceled]
        - $ref: '#/components/parameters/UpdatedSince'
      responses:
        '200':
          description: One page of projects.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  meta:
                    $ref: '#/components/schemas/PageMeta'
              example:
                data:
                  - id: proj_01jm5y0c4t6hqe8v
                    tenant_id: ten_01jm5wq0f8kavr3x
                    name: Whitfield Residence - Roof Replacement
