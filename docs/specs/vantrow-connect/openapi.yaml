  /v1/invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices
      description: >-
        Cursor-paginated list of invoices for the authenticated tenant, newest
        `updated_at` first. Requires the `read:invoices` scope.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: status
