<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Eaverow mark — concept B, Three Courses">
  <!-- Three shingle courses of descending length (a spineless lowercase "e" /
       capital "E" silhouette); the camel dot terminates the bottom row —
       literally the "eave-row". -->
  <path d="M28 30 H72" fill="none" stroke="#1d4b38" stroke-width="13" stroke-linecap="round"/>
  <path d="M28 50 H60" fill="none" stroke="#1d4b38" stroke-width="13" stroke-linecap="round"/>
  <path d="M28 70 H42" fill="none" stroke="#1d4b38" stroke-width="13" stroke-linecap="round"/>
  <circle cx="63" cy="70" r="10.5" fill="#b8956a"/>
</svg>
